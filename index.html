<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Tornei Calcetto</title>
    <meta name="description" content="Gestione dei tornei di calcetto aziendali: classifiche, calendario, marcatori e notifiche live." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0F4C9D" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Calcetto" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />

    <!-- Tema: applica modalità e temi colore prima del render (no flash) -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem('theme') || 'system';
          var light = localStorage.getItem('theme-light') || 'lexroom';
          var dark = localStorage.getItem('theme-dark') || 'lexroom';
          var isDark =
            m === 'dark' ||
            (m === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          var root = document.documentElement;
          root.classList.toggle('dark', isDark);
          root.setAttribute('data-light', light);
          root.setAttribute('data-dark', dark);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', isDark ? '#0a0a0a' : '#ffffff');
        } catch (e) {
          /* noop */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
